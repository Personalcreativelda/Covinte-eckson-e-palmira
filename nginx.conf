server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — todas as rotas (/sabado, /ambos, /domingo, /admin)
    # são tratadas pelo React Router, não pelo nginx
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longa para assets compilados (têm hash no nome)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Não logar pedidos de health check
    location = /health {
        access_log off;
        return 200 "ok";
    }
}
